name: CI
on:
  pull_request:
  push:
    branches: [main]
    tags: ["**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ocaml

jobs:
  build-image:
    name: Build CI container image (RHEL ${{ matrix.rhel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel: "8"
            dockerfile: docker/Dockerfile.build.rhel8
            tag: "8-5.3-2.3"
          - rhel: "9"
            dockerfile: docker/Dockerfile.build
            tag: "9-5.3-2.3"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for Docker changes
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            docker:
              - 'docker/Dockerfile.build'
              - 'docker/Dockerfile.build.rhel8'
              - 'scripts/opam-install.sh'
              - '.github/workflows/ci.yml'

      - name: Set up Docker Buildx
        if: steps.changes.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: steps.changes.outputs.docker == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Docker image
        if: steps.changes.outputs.docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}
          cache-from: type=gha,scope=rhel${{ matrix.rhel }}
          cache-to: type=gha,mode=max,scope=rhel${{ matrix.rhel }}

  build:
    name: Build and test (RHEL ${{ matrix.rhel }})
    runs-on: ubuntu-latest
    needs: build-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel: "8"
            tag: "8-5.3-2.3"
          - rhel: "9"
            tag: "9-5.3-2.3"
    permissions:
      packages: read
    env:
      EMAIL_RATE_LIMIT: 3600
      MATCHER_MAX_CAPACITY: 80
      MYSQL_DATABASE: test_econ
      MYSQL_ROOT_PASSWORD: password
    services:
      database-root:
        image: mariadb:10.6
        env:
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      database-tenant:
        image: mariadb:10.6
        env:
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}

      - name: add commit SHA for non-production builds
        if: github.ref_type != 'tag'
        run: |
          CURRENT_VERSION=$(grep -oP 'let to_string = "\K[^"]+' ./pool/version/version.ml)
          GIT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/^let to_string = \".*\"/let to_string = \"${CURRENT_VERSION}-${GIT_SHA}\"/" ./pool/version/version.ml

      - name: Build and test with Docker
        env:
          DATABASE_URL: mariadb://root:${{ env.MYSQL_ROOT_PASSWORD }}@database-root:3306/${{ env.MYSQL_DATABASE }}
          DATABASE_URL_TENANT_ONE: mariadb://root:${{ env.MYSQL_ROOT_PASSWORD }}@database-tenant:3306/${{ env.MYSQL_DATABASE }}
          SIHL_ENV: test
          SMTP_SENDER: test@econ.uzh.ch
          TEST_EMAIL: test@econ.uzh.ch
          SERVICE_NETWORK: ${{ job.services['database-root'].network }}
        run: |
          docker run --rm \
            --network "$SERVICE_NETWORK" \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            -e DATABASE_URL \
            -e DATABASE_URL_TENANT_ONE \
            -e TEST_EMAIL \
            -e SMTP_SENDER \
            -e SIHL_ENV \
            -e EMAIL_RATE_LIMIT \
            -e MATCHER_MAX_CAPACITY \
            -e SKIP_SYS_DEPS=1 \
            --user root \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.tag }}" \
            sh -lc '
              set -euo pipefail
              chown -R opam /app
              su -s /bin/bash opam -c "cd /app && /app/scripts/build.sh"
            '

      - uses: actions/upload-artifact@v7
        with:
          name: run.exe-rhel${{ matrix.rhel }}
          path: _build/default/pool/run/run.exe

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tests-rhel${{ matrix.rhel }}
          path: _build/default/pool/test/

      - name: Notify about failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook: ${{ secrets.ECON_TEAMS_WEBHOOK }}

  assets:
    name: Build assets
    if: github.repository == 'uzh/z-pool-tool'
    runs-on: ubuntu-latest
    container:
      image: node:lts

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: install yarn packages
        run: yarn install

      - name: build yarn package
        run: yarn build

      - name: move all assets to one folder
        run: '[ "$(ls pool/public)" ] && cp -r pool/public/* public || exit 0'

      - uses: actions/upload-artifact@v7
        with:
          name: assets
          path: public

      - name: Notify about failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook: ${{ secrets.ECON_TEAMS_WEBHOOK }}

  build-app-image:
    name: Build and push application Docker image (RHEL ${{ matrix.rhel }})
    runs-on: ubuntu-latest
    needs: [build, assets]
    if: github.ref_name == 'main' || github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - rhel: "8"
            dockerfile: docker/Dockerfile.app.rhel8
            artifact: run.exe-rhel8
            image_suffix: "-rhel8"
          - rhel: "9"
            dockerfile: docker/Dockerfile.app
            artifact: run.exe-rhel9
            image_suffix: ""
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download executable artifact (RHEL ${{ matrix.rhel }})
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: ./artifacts/run.exe

      - name: Download assets artifact
        uses: actions/download-artifact@v8
        with:
          name: assets
          path: ./artifacts/public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/z-pool-tool
          flavor: |
            suffix=${{ matrix.image_suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=app-rhel${{ matrix.rhel }}
          cache-to: type=gha,mode=max,scope=app-rhel${{ matrix.rhel }}

      - name: Notify about failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook: ${{ secrets.ECON_TEAMS_WEBHOOK }}

  deploy_staging:
    name: Trigger staging deploy
    runs-on: ubuntu-latest
    needs: [build, assets, build-app-image]
    if: github.ref_name == 'main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Trigger deploy
        uses: ./.github/actions/trigger-deploy
        with:
          url: ${{ secrets.ECON_DEPLOY_TRIGGER_URL }}
          token: ${{ secrets.ECON_DEPLOY_TRIGGER_TOKEN }}

  release:
    name: Release a new version
    runs-on: ubuntu-latest
    needs: [build, assets, build-app-image]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download executable artifact (RHEL 8)
        uses: actions/download-artifact@v8
        with:
          name: run.exe-rhel8
          path: run.exe-rhel8

      - name: Download executable artifact (RHEL 9)
        uses: actions/download-artifact@v8
        with:
          name: run.exe-rhel9
          path: run.exe-rhel9

      - name: Download assets artifact
        uses: actions/download-artifact@v8
        with:
          name: assets
          path: assets

      - name: Extract version changelog
        run: sed -nr "/^## .?v?${GITHUB_REF_NAME}/,/^## /p" CHANGELOG.md | sed '1d;2d;$d' > changes.md

      - name: Compress assets and executables
        run: |
          tar -zcf assets.tar.gz assets
          tar -zcf executable-rhel8.tar.gz run.exe-rhel8/run.exe
          tar -zcf executable-rhel9.tar.gz run.exe-rhel9/run.exe

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: changes.md
          files: |
            assets.tar.gz
            executable-rhel8.tar.gz
            executable-rhel9.tar.gz

      - name: Notify about failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook: ${{ secrets.ECON_TEAMS_WEBHOOK }}

  deploy_production:
    name: Trigger production deploy
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger deploy
        uses: ./.github/actions/trigger-deploy
        with:
          url: ${{ secrets.ECON_DEPLOY_TRIGGER_URL }}
          token: ${{ secrets.ECON_DEPLOY_TRIGGER_TOKEN }}
          target: production
